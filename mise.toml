[env]
_.path = ["./node_modules/.bin"]

[hooks]
enter = "mise install && ([ -d node_modules ] || bun install)"

[tools]
# NOTE: exiftool must be installed separately (eg: brew install exiftool)
bun = "latest"
pre-commit = "latest"

[settings]
lockfile = true

[[watch_files]]
patterns = ["package.json", "bun.lock"]
run = "bun install"
