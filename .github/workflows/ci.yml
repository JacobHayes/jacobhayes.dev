name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install exiftool
        run: sudo apt-get update && sudo apt-get install -y exiftool

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install

      - name: Run pre-commit
        run: pre-commit run --all-files
